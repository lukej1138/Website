<div id="projects" class="bg-good-black pt-25 px-5 min-h-screen">
  <!---This is for each img/popup--->
  <!--- <header class="flex items-center justify-center pb-15 text-6xl text-blue-400">My Work</header> --->
  <header class="flex flex-col items-center justify-center pb-8 text-5xl md:text-6xl">
    <div class="flex">
      <span class="font-light text-white">My_</span>
      <span class="font-bold text-blue-400">Portfolio</span>
    </div>
    <div class="mt-3 h-1 w-screen sm:w-85 md:w-100 rounded-full bg-blue-400"></div>
  </header>
  <div class="flex flex-col pb-8 gap-6 justify-center items-center">
    <div class="flex items-center md:flex-wrap gap-2">
      <div class="flex flex-wrap gap-2">
        @for (tag of filtersConn.appliedFilters; track $index) {
          <div (click)="filtersConn.adjustFilters(tag, true)" class="cursor-pointer text-sm font-medium text-good-black bg-blue-400 hover:bg-blue-300 px-3 py-0.5 rounded-full transition-colors">{{tag}}</div>
        }
      </div>
      <div (click)="toggleFilters()" class = "cursor-pointer flex items-center justify-center text-blue-400 transition-colors text-3xl leading-none cursor-pointer rounded-full border border-blue-400/50 pb-[0.3rem] justify-center hover:bg-blue-400/20 px-5">
        <button [class.hidden] = "!hideFilters()" class="cursor-pointer">+</button>
        <button [class.hidden] = "hideFilters()" class="cursor-pointer">-</button>
      </div>
    </div>
    <div [class.hidden]="hideFilters()" class="flex flex-wrap gap-2 p-4 rounded-xl border border-blue-400/20 bg-card max-w-lg">
      @for (tag of filtersConn.unappliedFilters; track $index) {
        <div (click)="filtersConn.adjustFilters(tag, false)" class="cursor-pointer text-sm text-blue-400 border border-blue-400/40 hover:bg-blue-400/10 px-3 py-0.5 rounded-full transition-colors">{{tag}}</div>
      }
    </div>
  </div>
  <div #projects class="flex flex-wrap gap-20 items-start justify-center">
    @for (project of firstThree(); track project.id) {
      <app-project-info #dummy [infoId] = 'project.id'/>
    }
  </div>
  <div class="extra-projects py-15 px-5 -mx-5" [class.expanded] = "isExpanded()">
    <div class="flex flex-wrap gap-20 items-start justify-center">
      @for (project of expanded(); track project.id) {
        <app-project-info [infoId] = 'project.id'/>
      }
    </div>
  </div>
  <div class="flex items-center justify-center text-xl text-blue-400 hover:text-blue-300">
    <button class="cursor-pointer absolute left-1/2 -translate-x-1/2 -translate-y-[3rem] rounded-xl px-2 border-solid border-1" [class.hidden] = "!canBeExpanded() || isExpanded()" (click) = "switchExpanded()">See More</button>
    <button class="cursor-pointer" [class.hidden] = "!canBeExpanded() || !isExpanded()" (click) = "switchExpanded()">See Less</button>
  </div>
</div>

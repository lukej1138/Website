<section id="contact" class="md:pt-10 pb-15">
    <form action="https://api.web3forms.com/submit" method="POST" class="gap-5 flex flex-col items-center justify-center">
        <h2 class="font-bold text-4xl md:text-5xl text-blue-400 px-5">Want To Get In Touch?</h2>
        <input type="hidden" name="access_key" value="fe00a997-7cb0-4188-a14b-8b3d060e04c5">
        <div class="contact-top *:border-blue-500 *text-blue-400 *:border-solid *:border-1 max-w-full px-5">
            <input type="text" name="name" placeholder="Your Name" class="contact-item contact-item-top" required>
            <input type="email" name="email" placeholder="Your Email" class="contact-item contact-item-top" required>
        </div>
        <div class="contact-bottom *:border-blue-500 *text-blue-400 *:border-solid *:border-1 max-w-full px-5">
            <textarea name="message" placeholder="Your Message" class="contact-item contact-item-bottom resize-none" required></textarea>
        </div>
        <button type="submit" class="cursor-pointer border-solid border-1 border-blue-500/50 rounded-full px-4 py-2 text-lg text-blue-400 hover:border-blue-500 transition-colors duration-300">Submit</button>
    </form>
</section>
